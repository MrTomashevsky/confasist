# ==============================================
# Основные настройки
# ==============================================

# Установка префикса на Alt+a (вместо Ctrl+b)
set -g prefix M-a
unbind C-b
bind M-a send-prefix

# Включить поддержку мыши
set -g mouse on

# Нумерация окон с 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Цвета
set -g default-terminal "screen-256color"
set -g status-style fg=black,bg=#959596

# История
set -g history-limit 10000

# Улучшенное управление буфером обмена
set -g set-clipboard on
set -g focus-events on

# ==============================================
# Горячие клавиши
# ==============================================

# Сброс префикса (Alt+a дважды для отправки Alt+a в приложение)
bind M-a send-prefix

bind M-h run-shell "help_tmux en | less"

# --- Навигация между окнами ---
# Alt+цифра - переключение на окно
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10

# Alt+Shift+цифра - перемещение окна
bind -n M-S-1 move-window -t 1
bind -n M-S-2 move-window -t 2
bind -n M-S-3 move-window -t 3
bind -n M-S-4 move-window -t 4
bind -n M-S-5 move-window -t 5
bind -n M-S-6 move-window -t 6
bind -n M-S-7 move-window -t 7
bind -n M-S-8 move-window -t 8
bind -n M-S-9 move-window -t 9
bind -n M-S-0 move-window -t 10

# --- Навигация между панелями ---
# Alt+стрелки - переключение панелей
bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R

# Alt+Shift+стрелки - изменение размера панеле
bind -n M-S-Left resize-pane -L 1
bind -n M-S-Down resize-pane -D 1
bind -n M-S-Up resize-pane -U 1
bind -n M-S-Right resize-pane -R 1

# --- Управление окнами и панелями ---
# Alt+Enter - новое окно (вместо новой панели)
bind -n M-Enter new-window

# Alt+| (вертикальная черта) - разделить панель вертикально
bind -n M-| split-window -h -c "#{pane_current_path}"
# Alt+- (минус) - разделить панель горизонтально
bind -n M-- split-window -v -c "#{pane_current_path}"

# Alt+Shift+| и Alt+Shift+- - альтернативные комбинации
bind -n M-S-| split-window -h -c "#{pane_current_path}"
bind -n M-S-- split-window -v -c "#{pane_current_path}"

# Alt+q - закрыть текущую панель
bind -n M-q kill-pane
# Alt+Shift+q - закрыть окно
bind -n M-S-q kill-window

# Alt+f - полноэкранный режим для панели
bind -n M-f resize-pane -Z

# Alt+Space - переключение между layout
bind -n M-Space next-layout

# Alt+s - переключение между сессиями
bind -n M-s choose-tree -s
# Alt+Shift+s - новая сессия
bind -n M-S-s command-prompt -p "Session name:" "new-session -s '%%'"
# Alt+d - открепить сессию
bind -n M-d detach-client

# Alt+Tab - переключение между окнами
bind -n M-Tab next-window
bind -n M-S-Tab previous-window

# Alt+x - поменять местами текущую панель с предыдущей
bind -n M-x swap-pane -U
# Alt+Shift+x - поменять местами текущую панель с следующей
bind -n M-S-x swap-pane -D

# --- Копирование/вставка ---
# Используем режим vi для копирования
set-window-option -g mode-keys vi
# Войти в режим копирования
bind -n M-c copy-mode
# Вставить
bind -n M-v paste-buffer

# Биндинги в режиме копирования (vi-style)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi Escape send-keys -X cancel

# --- Перезагрузка конфига ---
bind -n M-S-c source-file ~/.tmux.conf \; display "Config reloaded!"

# --- Быстрые команды ---
# Alt+t - показать время
bind -n M-t clock-mode
# Alt+l - очистить историю панели
bind -n M-l send-keys 'C-l'
# Alt+r - перерисовать клиент
bind -n M-r refresh-client

# --- Меню и помощь ---
# Alt+m - показать меню
bind -n M-m display-menu -T "Tmux Menu" \
    "New Window" n "new-window" \
    "Kill Window" k "kill-window" \
    "List Windows" w "choose-window" \
    "Panes Layout" l "select-layout" \
    "Detach" d "detach-client" \
    "" \
    "Reload Config" r "source-file ~/.tmux.conf" \
    "Show Keys" ? "list-keys"

# Alt+h - показать помощь
bind -n M-h display "Используйте Alt как модификатор. Префикс: Alt+a"

# ==============================================
# Стиль и внешний вид
# ==============================================

# Статус бар вверху
set -g status-position top

# Левая часть статус бара
set -g status-left "[#S] "
set -g status-left-length 20
set -g status-left-style fg=black,bg=#959595

# Правая часть статус бара
set -g status-right "#{?window_bigger,[#{window_offset_x},#{window_offset_y}] ,}#{=21:pane_title} %H:%M %d-%b"
set -g status-right-length 50
set -g status-right-style fg=black,bg=#959596

# Стиль активного окна
set -g window-status-current-style fg=black,bg=#959595
set -g window-status-current-format "#I:#W*"

# Стиль неактивных окон
set -g window-status-style fg=white,bg=black
set -g window-status-format "#I:#W"

# Стиль разделителя окон
set -g window-status-separator " | "

# Интервал обновления статуса
set -g status-interval 5

# Сообщения
set -g message-style fg=black,bg=#959596
set -g message-command-style fg=black,bg=#959595

# ==============================================
# Настройки производительности
# ==============================================

# Быстрый повтор клавиш
set -g repeat-time 300

# Время отображения
set -g display-time 2000
set -g display-panes-time 1500

# Визуальные уведомления
set -g visual-activity on
set -g visual-bell on
set -g visual-silence off
set -g monitor-activity on
set -g bell-action any
